name: Build FY_UZ801_V2.1 Debian 13 Full Image

on:
  workflow_dispatch:

env:
  BOOT_URL: https://github.com/KyonLi/ufi003-kernel/releases/download/6.12.94-1/boot.img
  BOOT_NO_MODEM_URL: https://github.com/KyonLi/ufi003-kernel/releases/download/6.12.94-1/boot-no-modem.img
  BOOT_NO_MODEM_OC_URL: https://github.com/KyonLi/ufi003-kernel/releases/download/6.12.94-1/boot-no-modem-oc.img
  K_IMAGE_DEB_URL: https://github.com/KyonLi/ufi003-kernel/releases/download/6.12.94-1/linux-image-6.12.94-msm8916-gaeb7498348fd_6.12.94-gaeb7498348fd-1_arm64.deb
  K_DEV_URL: https://github.com/KyonLi/ufi003-kernel/releases/tag/6.12.94-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo sh -e scripts/install_deps.sh
          sudo apt-get update
          sudo apt-get install -y gdisk mkbootimg

      - name: Build hyp and aboot firmware
        run: sudo sh -e scripts/build_hyp_aboot.sh

      - name: Extract MSM8916 firmware
        run: sudo sh -e scripts/extract_fw.sh

      - name: Create trixie rootfs
        run: sudo env RELEASE=trixie HOST_NAME=openstick-debian-uz801v21 KERNEL_SOURCE=none sh -e scripts/debootstrap.sh

      - name: Download prebuilt kernel release files
        run: |
          mkdir -p prebuilt-kernel
          wget -O prebuilt-kernel/boot.img "${BOOT_URL}"
          wget -O prebuilt-kernel/boot-no-modem.img "${BOOT_NO_MODEM_URL}"
          wget -O prebuilt-kernel/boot-no-modem-oc.img "${BOOT_NO_MODEM_OC_URL}"
          wget -O prebuilt-kernel/linux-image.deb "${K_IMAGE_DEB_URL}"
          printf '%s\n' "${K_DEV_URL}" > prebuilt-kernel/SOURCE_URL.txt

      - name: Install prebuilt kernel deb into rootfs
        run: |
          sudo env \
            KERNEL_DEB="${{ github.workspace }}/prebuilt-kernel/linux-image.deb" \
            DTB_BASENAME=msm8916-yiming-uz801v3.dtb \
            sh -e scripts/install_kernel_deb.sh

      - name: Build gadget-tool
        run: sudo sh -e scripts/build_gt.sh

      - name: Build FY_UZ801_V2.1 full image
        run: |
          sudo env \
            IMAGE_BASENAME=uz801_v2.1_debian13_trixie \
            BOOT_IMAGE_OVERRIDE="${{ github.workspace }}/prebuilt-kernel/boot.img" \
            sh -e scripts/build_fullimg_uz801_v21.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uz801-v2.1-debian13-trixie-fullimg
          path: |
            files/uz801_v2.1_debian13_trixie.img.xz
            files/uz801_v2.1_debian13_trixie.img
            files/uz801_v2.1_debian13_trixie_boot.img
            files/uz801_v2.1_debian13_trixie_rootfs.img
            files/uz801_v2.1_debian13_trixie_gpt.txt
            files/uz801_v2.1_debian13_trixie_SHA256SUMS
            prebuilt-kernel/boot.img
            prebuilt-kernel/boot-no-modem.img
            prebuilt-kernel/boot-no-modem-oc.img
            prebuilt-kernel/linux-image.deb
            prebuilt-kernel/SOURCE_URL.txt
            files/kernel-release.txt
            files/aboot.mbn
            files/hyp.mbn
            files/rpm.mbn
            files/sbl1.mbn
            files/tz.mbn
